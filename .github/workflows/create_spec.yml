# One-time repository setup required before this workflow works:
#   1. Secret CLAUDE_CODE_OAUTH_TOKEN - subscription auth (Pro/Max). Generate
#      locally with `claude setup-token`, then store as a repo secret. The token
#      expires and must be rotated periodically. (Swap to anthropic_api_key +
#      ANTHROPIC_API_KEY secret if subscription quotas throttle the full run.)
#   2. Settings -> Actions -> General -> Workflow permissions ->
#      enable "Allow GitHub Actions to create and approve pull requests"
#      (without it, the `gh pr create` step fails: "GitHub Actions is not
#      permitted to create or approve pull requests"). Equivalent CLI:
#        gh api -X PUT /repos/<owner>/<repo>/actions/permissions/workflow \
#          -f default_workflow_permissions=write -F can_approve_pull_request_reviews=true
#   3. The create-spec skill must be present on `main`.
#   4. GHCR access to the private smart-router image. Phase 8/10b pull
#      `ghcr.io/magma-devs/smart-router:main`. How to authenticate depends on
#      WHERE this repo lives:
#        - Same org as the package (Magma-Devs/lava-specs): the built-in
#          GITHUB_TOKEN works if the package is org-internal, OR (if private)
#          after granting this repo read access: Magma-Devs/smart-router ->
#          Packages -> smart-router -> Package settings -> "Manage Actions
#          access" -> add this repository (Read). Leave GHCR_PAT unset.
#        - Personal fork (e.g. you/lava-specs, a different owner): the built-in
#          GITHUB_TOKEN CANNOT pull another org's package. Create a classic PAT
#          with `read:packages` owned by a user who has read access to the
#          smart-router package, and store it as the repo secret GHCR_PAT. The
#          login step prefers GHCR_PAT when set.
#
# The PR is opened with the automatic GITHUB_TOKEN (author: github-actions[bot]).
# NOTE: GitHub does not auto-run pull_request CI for a GITHUB_TOKEN-opened PR;
# push a commit or close/reopen the PR to trigger checks.
#
# Manual trigger: Actions tab -> "Create Spec" -> Run workflow.
name: "Create Spec"

on:
  workflow_dispatch:
    inputs:
      chain_name:
        description: "Human-readable chain name (e.g. Iota)"
        required: true
        type: string
      chain_mainnet_index:
        description: "Uppercase mainnet spec index (e.g. IOTA)"
        required: true
        type: string
      chain_testnet_index:
        description: "Uppercase testnet spec index (e.g. IOTAT)"
        required: true
        type: string
      additional_data:
        description: "Free text: docs URLs, node URLs, inheritance hints, etc."
        required: false
        type: string
        default: ""
      show_full_output:
        description: "Stream ALL Claude messages live (watch phase progress / detect a stall). WARNING: dumps tool results to the PUBLIC run log — may expose URLs/keys."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  packages: read   # pull the private smart-router image from GHCR (Phase 8/10b)

# Per-chain: serialize only runs for the SAME chain (they race on the same
# branch/PR). Different chains run in parallel — each run gets its own VM, so the
# smart-router container's published ports (3360+) don't collide across runs.
# (Use a single static group instead only if you move to a self-hosted runner
# shared by runs, where the host docker daemon and ports are shared.)
concurrency:
  group: create-spec-${{ github.event.inputs.chain_name }}
  cancel-in-progress: false

jobs:
  create_spec:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute branch name
        id: branch
        env:
          CHAIN_NAME: ${{ github.event.inputs.chain_name }}
          CHAIN_MAINNET_INDEX: ${{ github.event.inputs.chain_mainnet_index }}
        run: |
          chain_lower="$(printf '%s' "$CHAIN_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')"
          if [ -z "$chain_lower" ]; then
            echo "chain_name '$CHAIN_NAME' sanitizes to an empty branch slug" >&2
            exit 1
          fi
          # create-spec names the file after the mainnet INDEX lowercased
          # (e.g. ZEC -> zec.json), which can differ from the chain name
          # (ZCash -> zcash). The spec path must use the index, not the name.
          index_lower="$(printf '%s' "$CHAIN_MAINNET_INDEX" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')"
          if [ -z "$index_lower" ]; then
            echo "chain_mainnet_index '$CHAIN_MAINNET_INDEX' sanitizes to empty" >&2
            exit 1
          fi
          base="${chain_lower}-spec"
          name="$base"
          if git ls-remote --exit-code --heads origin "$base" >/dev/null 2>&1; then
            name="${base}-$(date +%d-%m-%Y)"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "chain_lower=$chain_lower" >> "$GITHUB_OUTPUT"
          echo "index_lower=$index_lower" >> "$GITHUB_OUTPUT"
          git checkout -b "$name"
          git push -u origin "$name"

      # Node 22 guarantees a global `WebSocket` so the agent can probe ws/
      # subscription chains (eth_subscribe) through the smart-router without npm installs.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Phase 8/10b no longer build any lava binaries: they boot the spec inside
      # the dockerized smart-router (ghcr.io/magma-devs/smart-router:main) and
      # probe every method through it. ubuntu-latest ships Docker preinstalled
      # and running, and this job runs on the host (not in a `container:`), so
      # the agent can `docker run` directly — NO docker-in-docker service needed.
      # We only install the probe tooling the agent uses against localhost:3360:
      #   preinstalled on ubuntu-latest: curl, awk, sed, timeout, tee, python3,
      #     node (Node 22 pinned above for WebSocket), docker;
      #   installed below: jq (robust to runner-image changes), grpcurl (gRPC-
      #     interface probes — fetched as a release binary, no Go toolchain).
      - name: Install probe tools (for create-spec Phase 8/10b)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          GRPCURL_VERSION=1.9.1
          curl -fsSL "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin grpcurl
          grpcurl --version || true

      # Log in to GHCR so the agent's `docker pull` of the private smart-router
      # image succeeds. Credentials land in the runner user's docker config,
      # which the claude-code-action step (same user, same host) reuses.
      # Personal fork: set a GHCR_PAT secret (classic PAT with read:packages,
      # owned by a user with read access to Magma-Devs/smart-router) — the
      # built-in GITHUB_TOKEN cannot pull a package owned by another org.
      # Same org: leave GHCR_PAT unset; GITHUB_TOKEN is used (the `||` fallback).
      - name: Log into GHCR (for the smart-router image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      # Fail fast: pull (and sanity-probe) the smart-router image right after
      # login, so a GHCR access/auth misconfig surfaces in seconds instead of
      # ~1.5h into the agent run when Phase 8 first reaches for it. The full
      # boot + method probe is exercised by Phase 8 itself; here we only confirm
      # the image pulls and runs. The pull also warms the local docker cache, so
      # the agent's later `docker image inspect`/pull is a credential-free hit.
      - name: Pull + probe smart-router image (pre-flight)
        env:
          # Boolean only — never the secret value. false ⇒ GITHUB_TOKEN fallback.
          HAS_PAT: ${{ secrets.GHCR_PAT != '' }}
        run: |
          set -euo pipefail
          IMAGE=ghcr.io/magma-devs/smart-router:main
          echo "Auth source: GHCR_PAT present = ${HAS_PAT}  (false ⇒ logged in with GITHUB_TOKEN)"
          echo "Pulling $IMAGE ..."
          if ! docker pull "$IMAGE"; then
            echo "::error::Pull DENIED — the credential used has no read access to ${IMAGE}."
            if [ "${HAS_PAT}" != "true" ]; then
              echo "::error::GHCR_PAT secret is NOT set; the built-in GITHUB_TOKEN was used. A personal fork's GITHUB_TOKEN cannot pull another org's private package. Add a repo secret GHCR_PAT = classic PAT with read:packages, SSO-authorized for Magma-Devs."
            else
              echo "::error::GHCR_PAT IS set but pull was still denied. Verify it is a CLASSIC PAT with read:packages, SSO-authorized for Magma-Devs, owned by an account with read access to the smart-router package."
            fi
            exit 1
          fi
          docker image inspect "$IMAGE" --format 'Pulled OK: {{index .RepoDigests 0}}'
          # Probe that the image actually executes (no config/specs/network
          # needed). Run with no args + a short timeout: the entrypoint prints
          # its startup banner ("Process Started" / "Running Smart Router")
          # BEFORE it needs a config, then exits — that's expected. We only hard
          # fail on a genuine container-exec failure (arch mismatch / missing
          # binary), which Docker reports as "exec format error".
          echo "Probing image entrypoint ..."
          out="$(timeout 15 docker run --rm "$IMAGE" 2>&1 || true)"
          echo "$out" | head -20
          if echo "$out" | grep -qiE "exec format error|cannot execute binary"; then
            echo "::error::smart-router image failed to execute — arch/binary problem (see output above)"; exit 1
          elif echo "$out" | grep -qiE "Process Started|Running Smart Router|RPCSmartRouter"; then
            echo "Image runs (entrypoint started)."
          else
            echo "::warning::Image pulled and ran without an exec error, but the startup banner was not seen — continuing (Phase 8 will do the full boot)."
          fi

      - name: Run create-spec
        id: run
        uses: anthropics/claude-code-action@v1
        with:
          # Subscription auth (Pro/Max). Generate locally with `claude setup-token`
          # and store as the CLAUDE_CODE_OAUTH_TOKEN secret. NOTE: a full run is
          # ~1h30m on opus with ~20 subagents — heavy against subscription quotas;
          # it may throttle or hit weekly caps. Swap to anthropic_api_key if so.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pass GITHUB_TOKEN directly so the action skips the OIDC->Claude-App
          # token exchange (avoids needing the Claude GitHub App installed and the
          # id-token: write permission). Maps to OVERRIDE_GITHUB_TOKEN internally.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Live visibility into phase progress / stalls. Off by default (dumps
          # tool results to the PUBLIC log); flip the show_full_output dispatch
          # input on per run when debugging.
          show_full_output: ${{ inputs.show_full_output }}
          # display_report renders the full run report into $GITHUB_STEP_SUMMARY,
          # but a 12-phase / ~20-subagent create-spec run produces ~1.5MB — over
          # GitHub's hard 1MB summary cap — so the upload always fails with a red
          # annotation while adding nothing: the curated summary already goes to
          # the PR body (pr_body.md) and the full transcript to the run artifact.
          display_report: false
          claude_args: |
            --model opus
            --dangerously-skip-permissions
            --max-turns 1000
          prompt: |
            Run the /create-spec skill end-to-end for a new chain, fully unattended.

            Phase 2 inputs (do NOT ask me for these — use exactly these values):
            - Chain name: ${{ github.event.inputs.chain_name }}
            - Mainnet spec index: ${{ github.event.inputs.chain_mainnet_index }}
            - Testnet spec index: ${{ github.event.inputs.chain_testnet_index }}
            - Additional data (docs URLs, node URLs, inheritance hints): ${{ github.event.inputs.additional_data }}

            Execution rules for this unattended CI run:
            - Run the FULL 12-phase pipeline, INCLUDING the Phase 8 smart-router boot and the Phase 10b re-probe.
            - There is NO human available. At EVERY STOP-and-ask gate (archive
              extension include/omit, block-time disagreement >20%, existing-file
              prompt, archive NEEDS_HUMAN_DECISION), DO NOT stop — auto-decide with
              the conservative default and continue.
            - Track every auto-decision you make and the sources you relied on
              (docs URLs, RPC node URLs probed, upstream parent spec, other refs).
            - The Phase 11 final reviewer ends in one of two verdicts: APPROVED
              (final TALLY CRITICAL=0 MEDIUM=0) or CHANGES REQUESTED (any CRITICAL
              or MEDIUM remaining). Normally CHANGES REQUESTED halts before Phase
              12 — but in THIS unattended run, do NOT halt: record the verdict and
              the TALLY counts and continue so the PR still opens. Report the
              verdict HONESTLY in pr_body.md — never upgrade CHANGES REQUESTED to
              APPROVED.
            - Do NOT perform any git operations. The workflow handles commit/push/PR.

            When the pipeline is complete, write a file `pr_body.md` at the repo
            root with EXACTLY this structure, filled in:

            ## New chain spec: ${{ github.event.inputs.chain_name }}

            ### 🧪 Review verdict: <APPROVED | CHANGES REQUESTED>
            <One line. From the Phase 11 final reviewer.>

            #### Unresolved findings (review these first)
            <One row per CRITICAL/MEDIUM gap the pipeline left unfixed (the
            Phase 11 no-loop policy). Each row must be actionable on its own:
            what is wrong, where in the spec, and the concrete change the
            reviewer recommends. Write "None." when APPROVED with nothing
            remaining. Also list here any disable-suggestions stripped by the
            Phase 10 filter (probe-only evidence) as "watch-list: re-test on a
            paid/dedicated node".>

            | # | Severity | Finding | Spec location | Suggested fix |
            |---|----------|---------|---------------|---------------|
            | 1 | <CRITICAL/MEDIUM> | <what is wrong and why it was flagged> | <index / collection / api or field> | <the concrete recommended change> |

            | Reviewer | CRITICAL | MEDIUM | MINOR |
            |----------|---------:|-------:|------:|
            | Phase 11 final | <X> | <Y> | <Z> |
            | Phase 9 reviewer 1 | <X> | <Y> | <Z> |
            | Phase 9 reviewer 2 | <X> | <Y> | <Z> |
            | Phase 9 reviewer 3 | <X> | <Y> | <Z> |

            | Field | Value |
            |-------|-------|
            | Chain name | ${{ github.event.inputs.chain_name }} |
            | Mainnet index | ${{ github.event.inputs.chain_mainnet_index }} |
            | Testnet index | ${{ github.event.inputs.chain_testnet_index }} |
            | Spec file | <chain>.json |

            ### Runtime verification (smart-router)
            <If the router could NOT boot in Phase 8 or Phase 10b, the FIRST
            line of this section MUST say so in bold — name the cause and the
            fallback evidence used (e.g. direct-upstream probing). Never let a
            table below claim OK without that caveat leading the section.>

            | Check | Phase 8 | Phase 10b |
            |-------|---------|-----------|
            | Parse directives (PARSE) | <OK/FAIL/PARTIAL/skipped> | <OK/FAIL/PARTIAL/n-a> |
            | Verifications (VERIFY) | <OK/FAIL/PARTIAL/skipped> | <OK/FAIL/PARTIAL/n-a> |
            | Testnet verifications (TESTNET_VERIFY) | <OK/FAIL/PARTIAL/SKIPPED + reason> | <n-a unless testnet entry was fixed> |
            | Block time (empirical, Step 8) | mainnet <n> ms / testnet <n> ms or skipped | — |

            <The PARSE/VERIFY verdicts come from the smart-router-tester (Phase 8
            Step 3.5) and smart-router-smoke-tester (Phase 10b Step 1.5) returns:
            PARSE = GET_BLOCKNUM/GET_BLOCK_BY_NUM executed by the live router
            (metrics-gated), VERIFY = per-verification boot outcomes (chain-id,
            pruning/GET_EARLIEST_BLOCK, ...). TESTNET_VERIFY = the Step 7 boot
            of the TESTNET spec variant (chain-id expected_value live-executed).
            If FAIL/PARTIAL, name the failing directive/verification and the
            affected upstreams right below the table. Any BLOCK_TIME_MISMATCH
            gets its own line below the table with spec-vs-empirical values.
            If Phase 8 was skipped, write "skipped" for all rows.>

            ### Addon & extension coverage
            <From the Phase 8 "Addon & extension coverage" table (re-checked in
            Phase 10b). One row per addon/extension the spec declares; if none,
            write "None declared in this spec.". NOT_TESTABLE means no provided
            node supports it — name what evidence the capability probe returned,
            so a reviewer can re-run with a more capable node URL.>

            | Name | Type | Result | Notes |
            |------|------|--------|-------|
            | <archive/debug/...> | <addon/extension> | <✅ tested-ok / ❌ failed / ⚪ not testable> | <upstreams supporting it, or probe evidence for not-testable> |

            ### Inputs provided
            ${{ github.event.inputs.additional_data }}

            ### Sources used
            - **Docs:** <doc URLs cited>
            - **RPC nodes:** <mainnet + testnet node URLs probed>
            - **Upstream parent spec:** <parent spec imported, if any>

            ### Calculations table
            <the Phase-4 network-params calculations table>

            ### ⚠️ Auto-decisions made (review these)
            <every STOP gate you auto-resolved and the default you chose>

            ### Supporting evidence (INLINE — do NOT reference file paths)
            Reviewers cannot open /tmp files or uncommitted docs, so paste the
            ACTUAL CONTENT here, each inside a collapsible <details> block. Never
            write "see /tmp/..." or "see docs/..."; inline the content itself.

            <details><summary>Phase-8 method probe report</summary>

            <paste the full body of the METHOD_PROBE_REPORT you generated>
            </details>

            <details><summary>API method list (&lt;N&gt; methods)</summary>

            <paste the full method list, one per line>
            </details>

            <details><summary>Parse directives</summary>

            <paste the directives you derived>
            </details>

      - name: Verify spec produced
        id: verify
        run: |
          # Specs live flat at the repo root. The file is named after the mainnet
          # index lowercased (e.g. ZEC -> zec.json), NOT the chain name.
          index_lower="${{ steps.branch.outputs.index_lower }}"
          spec="${index_lower}.json"
          if [ ! -f "$spec" ]; then
            echo "Expected spec file $spec was not produced by create-spec" >&2
            echo "--- repo-root *.json (for debugging) ---" >&2
            ls -1 ./*.json >&2 || true
            exit 1
          fi
          echo "spec=$spec" >> "$GITHUB_OUTPUT"

      - name: Commit and push spec
        env:
          CHAIN_NAME: ${{ github.event.inputs.chain_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit only the spec file at the repo root. Working artifacts the
          # skill emits (docs/<chain>/ probe + review reports) are gitignored.
          git add "${{ steps.verify.outputs.spec }}"
          git commit -m "feat(spec): add ${CHAIN_NAME} chain spec"
          git push origin "${{ steps.branch.outputs.name }}"

      # Defense-in-depth: the agent is instructed never to dump the environment,
      # but if a future run prints a token anyway (env, event.json, a JWT, etc.),
      # this redaction keeps it out of the uploaded transcript. Scrubs known
      # secret shapes in-place before the artifact is created.
      - name: Redact secrets from transcript
        if: always()
        run: |
          f="${{ steps.run.outputs.execution_file }}"
          [ -f "$f" ] || { echo "no transcript to redact"; exit 0; }
          perl -pi -e '
            s/sk-ant-[a-z0-9]+-[A-Za-z0-9_-]+/sk-ant-REDACTED/g;
            s/gh[posru]_[A-Za-z0-9]{20,}/ghx_REDACTED/g;
            s/eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+/JWT_REDACTED/g;
          ' "$f"
          echo "redaction pass complete"

      - name: Upload transcript artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: create-spec-transcript
          path: |
            ${{ steps.run.outputs.execution_file }}
            pr_body.md
          if-no-files-found: warn
          retention-days: 5

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHAIN: ${{ github.event.inputs.chain_name }}
        run: |
          branch="${{ steps.branch.outputs.name }}"
          chain="$CHAIN"

          # Fallback stub if create-spec did not write pr_body.md
          if [ ! -f pr_body.md ]; then
            printf '## New chain spec: %s\n\n_pr_body.md was not produced; see run logs._\n' "$chain" > pr_body.md
          fi

          # Append run/artifact footer
          {
            printf '\n\n---\n'
            printf '🤖 Generated by `create_spec.yml` · [workflow run](%s) · full transcript in run artifacts\n' "$RUN_URL"
          } >> pr_body.md

          # GitHub PR bodies are capped at 65536 chars. Inlining the probe report
          # + method list can exceed that, which would make `gh pr create` fail.
          # Truncate to a safe budget and point to the full transcript artifact;
          # pr_body.md itself is uploaded whole in the transcript artifact above.
          MAX=63000
          if [ "$(wc -c < pr_body.md)" -gt "$MAX" ]; then
            head -c "$MAX" pr_body.md > pr_body.trunc.md
            {
              printf '\n\n> **⚠️ PR body truncated** at %s chars to fit GitHub limits.\n' "$MAX"
              printf '> Full pr_body.md (with all inlined evidence) is in the run transcript artifact: %s\n' "$RUN_URL"
            } >> pr_body.trunc.md
            mv pr_body.trunc.md pr_body.md
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "feat(spec): add ${chain} chain spec" \
            --body-file pr_body.md
