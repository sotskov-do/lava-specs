# Smart-Router dry run — fast, agent-free pre-flight for create-spec Phase 8/10b.
#
# Validates the docker mechanics in isolation (no Claude agent, ~1 minute):
#   1. GHCR login + `docker pull ghcr.io/magma-devs/smart-router:main`
#      (this is where an access misconfig surfaces — a 403 here means the
#      smart-router package has not granted this repo read access).
#   2. Boot the router against a real spec from this repo (default ETH1 from
#      ethereum.json) with public RPC upstreams, exactly as the Phase 8 tester
#      does: stage the flat specs dir, write an endpoints + direct-rpc config,
#      `docker run`, poll readiness, probe one method through localhost:3360.
#   3. Print router logs and tear down.
#
# One-time setup: the same GHCR package-access requirement as create_spec.yml
# (item 4 of its header) — Magma-Devs/smart-router package must grant this repo
# Read access, or be org-internal with this repo in the same org.
#
# Manual trigger: Actions tab -> "Smart-Router Dry Run" -> Run workflow.
name: "Smart-Router Dry Run"

on:
  workflow_dispatch:
    inputs:
      chain_index:
        description: "Spec index to boot (must exist in a repo-root <chain>.json)"
        required: true
        type: string
        default: "ETH1"
      api_interface:
        description: "api-interface: jsonrpc | rest | grpc | tendermintrpc"
        required: true
        type: string
        default: "jsonrpc"
      node_urls:
        description: "Comma-separated upstream RPC URLs. For subscription chains (e.g. ETH1) include a wss:// URL or the router excludes the provider."
        required: true
        type: string
        default: "https://ethereum-rpc.publicnode.com,wss://ethereum-rpc.publicnode.com"
      probe_request:
        description: "jsonrpc/tendermintrpc: JSON-RPC body to POST. rest: a GET path beginning with /"
        required: false
        type: string
        default: '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'

permissions:
  contents: read
  packages: read   # pull the private smart-router image from GHCR

jobs:
  dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      IMAGE: ghcr.io/magma-devs/smart-router:main
      CHAIN_INDEX: ${{ github.event.inputs.chain_index }}
      API_INTERFACE: ${{ github.event.inputs.api_interface }}
      NODE_URLS: ${{ github.event.inputs.node_urls }}
      PROBE_REQUEST: ${{ github.event.inputs.probe_request }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Personal fork: set a GHCR_PAT secret (classic PAT with read:packages,
      # owned by a user with read access to Magma-Devs/smart-router) — the
      # built-in GITHUB_TOKEN cannot pull a package owned by another org.
      # Same org: leave GHCR_PAT unset; GITHUB_TOKEN is used (the `||` fallback).
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Pull smart-router image
        env:
          # Boolean only — never the secret value. true ⇒ GHCR_PAT was used for
          # login; false ⇒ the GITHUB_TOKEN fallback was used.
          HAS_PAT: ${{ secrets.GHCR_PAT != '' }}
        run: |
          echo "Auth source: GHCR_PAT present = ${HAS_PAT}  (false ⇒ logged in with GITHUB_TOKEN)"
          echo "Pulling $IMAGE ..."
          if ! docker pull "$IMAGE"; then
            echo "::error::Pull DENIED — the credential used has no read access to ${IMAGE}."
            if [ "${HAS_PAT}" != "true" ]; then
              echo "::error::GHCR_PAT secret is NOT set, so the built-in GITHUB_TOKEN was used. A personal fork's GITHUB_TOKEN cannot pull another org's private package. Fix: add a repo secret GHCR_PAT = classic PAT with read:packages, SSO-authorized for Magma-Devs, owned by an account that can read the smart-router package."
            else
              echo "::error::GHCR_PAT IS set but pull was still denied. Check: (1) it is a CLASSIC PAT (not fine-grained) with the read:packages scope; (2) it is SSO-authorized for the Magma-Devs org (token list -> Configure SSO -> Authorize); (3) the owning account actually has read access to the Magma-Devs/smart-router package."
            fi
            exit 1
          fi
          docker image inspect "$IMAGE" --format 'Pulled: {{.RepoTags}} (digest {{index .RepoDigests 0}})'

      - name: Stage specs + write router config
        run: |
          set -euo pipefail
          # The candidate index must exist in a repo-root <chain>.json.
          if ! ls ./*.json >/dev/null 2>&1; then
            echo "No spec JSONs at repo root" >&2; exit 1
          fi
          found=""
          for f in ./*.json; do
            if jq -e --arg idx "$CHAIN_INDEX" \
                 '.proposal.specs[]? | select(.index == $idx)' "$f" >/dev/null 2>&1; then
              found="$f"; break
            fi
          done
          if [ -z "$found" ]; then
            echo "No repo-root spec declares index ${CHAIN_INDEX}" >&2
            echo "Available indices:" >&2
            jq -r '.proposal.specs[]?.index' ./*.json 2>/dev/null | sort -u >&2 || true
            exit 1
          fi
          echo "Index ${CHAIN_INDEX} found in: $found"

          # --use-static-spec takes a directory; stage a clean copy of all flat
          # specs so the candidate's imports resolve from the same set.
          mkdir -p /tmp/sr_specs
          cp ./*.json /tmp/sr_specs/

          # Build one direct-rpc upstream block per node URL.
          {
            echo 'metrics-listen-address: "0.0.0.0:7779"'
            echo ''
            echo 'endpoints:'
            echo '  - listen-address: "0.0.0.0:3360"'
            echo '    network-address: "0.0.0.0:3360"'
            echo "    chain-id: \"${CHAIN_INDEX}\""
            echo "    api-interface: \"${API_INTERFACE}\""
            echo ''
            # One provider block holding all URLs, so an http URL and its wss
            # pair stay in the same provider. The router REQUIRES a ws/wss URL
            # for any chain whose spec enables subscriptions (e.g. ETH1's
            # eth_subscribe) — without it the provider fails verification and is
            # excluded, and a single-provider endpoint then cannot serve.
            echo 'direct-rpc:'
            echo "  - name: \"dryrun-${CHAIN_INDEX}\""
            echo "    chain-id: \"${CHAIN_INDEX}\""
            echo "    api-interface: \"${API_INTERFACE}\""
            echo '    node-urls:'
            IFS=',' read -ra URLS <<< "$NODE_URLS"
            for u in "${URLS[@]}"; do
              u="$(echo "$u" | xargs)"   # trim whitespace
              [ -z "$u" ] && continue
              echo "      - url: \"${u}\""
            done
          } > /tmp/sr.yml

          echo "----- /tmp/sr.yml -----"
          cat /tmp/sr.yml
          python3 -c 'import yaml; yaml.safe_load(open("/tmp/sr.yml"))' && echo "YAML OK"

      - name: Boot router
        run: |
          set -euo pipefail
          docker rm -f sr_dryrun 2>/dev/null || true
          docker run -d --name sr_dryrun \
            -p 3360:3360 -p 7779:7779 \
            -v /tmp/sr_specs:/smart-router/specs:ro \
            -v /tmp/sr.yml:/smart-router/sr.yml:ro \
            "$IMAGE" \
            sr.yml --geolocation 1 --use-static-spec specs/ --log-level debug --log-format json

          # Only genuinely fatal lines abort. Per-provider "failed verification
          # on provider startup" is NOT fatal — the router still boots and serves
          # if at least one provider passes (a pruned/whitelist upstream failing
          # one verification must not fail the dry run). This mirrors the Phase-8
          # tester's fail-fast set exactly.
          FATAL='panic|fatal|failed to (load|expand|resolve) spec|all static providers failed verification|cannot serve endpoint|no matching spec'
          echo "Waiting for the listener (max 120s)..."
          ok=""; fatal=""
          for _ in $(seq 1 60); do
            if curl -s -o /dev/null -m 3 http://localhost:3360 \
                 -H "content-type: application/json" \
                 -d '{"jsonrpc":"2.0","method":"","params":[],"id":1}'; then
              ok="yes"; break
            fi
            # The container may also exit on a fatal error; either way, detect it.
            if docker logs sr_dryrun 2>&1 | grep -qiE "$FATAL"; then
              fatal="yes"; break
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' sr_dryrun 2>/dev/null)" != "true" ]; then
              fatal="yes"; break
            fi
            sleep 2
          done
          echo "----- router logs (tail) -----"
          docker logs --tail 80 sr_dryrun 2>&1 || true
          if [ -z "$ok" ]; then
            # Surface the most common spec-config cause with an actionable hint.
            if docker logs sr_dryrun 2>&1 | grep -qi "websocket is not provided"; then
              echo "::error::Router excluded all providers: this chain's spec enables subscriptions but no ws/wss upstream was supplied. Add a wss:// URL to node_urls and re-run."
            elif [ -n "$fatal" ]; then
              echo "::error::Router hit a fatal/spec error before serving (see logs above)"
            else
              echo "::error::Router listener did not come up"
            fi
            exit 1
          fi
          echo "Listener is up."

      # The listener answering proves the router boots and can RELAY requests,
      # but a relayed eth_blockNumber does NOT exercise the spec's GET_BLOCKNUM
      # parse directive — the chain tracker does. A spec with a broken
      # GET_BLOCKNUM result_parsing would still pass the probe yet never track
      # the chain. So assert the tracker actually fetched a height via the
      # directive: lava_rpcsmartrouter_latest_block > 0. (The tracker may first
      # burn a few retries on a wss-only upstream — "WebSocket SendRequest not
      # implemented" — before recovering on the http upstream ~15s later; the
      # poll below tolerates that.) Skipped for non-jsonrpc/tendermintrpc, whose
      # metric shape differs.
      - name: Check chain-tracker health (GET_BLOCKNUM)
        run: |
          set -uo pipefail
          case "$API_INTERFACE" in
            jsonrpc|tendermintrpc) ;;
            *) echo "Skipping metric check for api-interface=$API_INTERFACE"; exit 0 ;;
          esac

          # Ground truth: ask the router for the live height the same way the
          # tracker should. For the eth_blockNumber default this is a hex result;
          # convert to decimal. If we can't derive it (non-eth method), fall back
          # to a weaker "metric must be positive" check and say so.
          truth=""
          th="$(curl -s -m 10 -X POST http://localhost:3360 \
                  -H 'content-type: application/json' \
                  -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null \
                | jq -r '.result // empty')"
          case "$th" in 0x*|0X*) truth=$((th)) ;; esac

          # Read the metric robustly: match ONLY the latest_block gauge (with or
          # without label set), take the LAST field as the value (handles
          # `name{labels} value`), coerce any float/sci-notation to an integer
          # (%.0f), and take the MAX across series so a sibling counter like
          # `..._latest_block_updates 2` can never shadow the real height.
          read_height() {
            curl -s -m 3 http://localhost:7779/metrics \
              | grep -E '^lava_rpcsmartrouter_latest_block([ {]|$)' \
              | awk '{printf "%.0f\n", $NF}' | sort -n | tail -1
          }

          echo "Polling lava_rpcsmartrouter_latest_block (max 60s; ground-truth height=${truth:-unknown})..."
          blk=""
          for _ in $(seq 1 20); do
            m="$(read_height)"; m="${m:-0}"
            if [ "$m" -gt 0 ] 2>/dev/null; then
              if [ -n "$truth" ]; then
                d=$(( truth > m ? truth - m : m - truth ))
                # within 5000 blocks of the live chain → the directive tracks reality
                if [ "$d" -le 5000 ]; then blk="$m"; break; fi
              else
                blk="$m"; break
              fi
            fi
            sleep 3
          done

          if [ -z "$blk" ]; then
            echo "----- latest_block metric lines -----"
            curl -s -m 3 http://localhost:7779/metrics | grep -E 'latest_block' || echo "(none)"
            echo "----- router logs (tail) -----"
            docker logs --tail 80 sr_dryrun 2>&1 || true
            if [ -n "$truth" ]; then
              echo "::error::Chain tracker latest_block never reached the live height (~${truth}). GET_BLOCKNUM is likely broken (wrong template/parser_func/parser_arg/encoding) or no upstream served it — a wrong value like 2 fails here instead of passing."
            else
              echo "::error::Chain tracker never reported a positive latest_block. GET_BLOCKNUM likely broken, or no upstream served it."
            fi
            exit 1
          fi
          echo "GET_BLOCKNUM healthy: tracked latest_block=$blk (ground-truth=${truth:-unknown})"

      - name: Probe one method
        run: |
          set -euo pipefail
          case "$API_INTERFACE" in
            rest)
              # PROBE_REQUEST is a GET path beginning with /
              echo "GET http://localhost:3360${PROBE_REQUEST}"
              resp="$(curl -s -m 10 "http://localhost:3360${PROBE_REQUEST}")"
              ;;
            *)
              echo "POST http://localhost:3360  body=${PROBE_REQUEST}"
              resp="$(curl -s -m 10 -X POST http://localhost:3360 \
                        -H 'content-type: application/json' \
                        -d "${PROBE_REQUEST}")"
              ;;
          esac
          echo "----- response -----"
          echo "$resp"
          # PASS if we got a result field; FAIL on -32601 (method not routed).
          if echo "$resp" | grep -q '"result"'; then
            echo "PROBE: PASS (got result)"
          elif echo "$resp" | grep -q '"code":-32601'; then
            echo "::error::PROBE FAIL — method not found/routed (-32601)"; exit 1
          elif [ -n "$resp" ]; then
            echo "PROBE: responded (no result field) — inspect the body above"
          else
            echo "::error::PROBE FAIL — empty response"; exit 1
          fi

      - name: Tear down
        if: always()
        run: docker rm -f sr_dryrun 2>/dev/null || true
